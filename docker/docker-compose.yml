services:
  mongodb:
    image: mongo:8
    container_name: hongs-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: hongs_form
    volumes:
      - mongodb_data:/data/db
    networks:
      - hongs-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: hongs-server
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      BASE_URL: http://localhost:8080
      MONGODB_URI: mongodb://mongodb:27017/hongs_form
    volumes:
      - ./public/upload:/app/public/upload
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - hongs-network

  nginx:
    image: nginx:alpine
    container_name: hongs-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./public:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api-server
    networks:
      - hongs-network

volumes:
  mongodb_data:

networks:
  hongs-network:
    driver: bridge